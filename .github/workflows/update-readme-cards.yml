name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dark&count_private=true&hide_border=true&card_width=440
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=dark&hide_border=true&card_width=440&langs_count=6
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Padronizar altura do card de linguagens
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          card = Path("profile/top-langs.svg")
          content = card.read_text(encoding="utf-8")

          content = re.sub(
              r'(<svg\s+[^>]*?height=")[0-9]+("[^>]*>)',
              r'\g<1>195\g<2>',
              content,
              count=1,
              flags=re.DOTALL,
          )
          content = re.sub(
              r'viewBox="0 0 440 [0-9]+"',
              'viewBox="0 0 440 195"',
              content,
              count=1,
          )
          content = content.replace(
              "width: calc(100%-100px);",
              "width: calc(100% - 100px);",
          )

          card.write_text(content, encoding="utf-8")
          PY

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add profile/stats.svg profile/top-langs.svg

          if git diff --cached --quiet; then
            echo "Nenhuma alteração nos cards"
          else
            git commit -m "Atualiza cards do README"
            git push
          fi
